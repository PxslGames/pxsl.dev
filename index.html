<body>

  <div class="bg">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="grid"></div>
  </div>

  <div class="card-wrap">

    <div class="card" id="card">

      <div class="shine"></div>

      <img class="avatar" src="assets/website/pfp.png" alt="Profile Picture" />

      <h1 class="username">Pxsl</h1>

      <p class="tag">
        idiot • developer • terminal addict
      </p>

      <div class="divider"></div>

      <div class="links-container">

        <button class="nav-btn" id="prevPage">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
      
        <div class="links" id="links"></div>
      
        <button class="nav-btn" id="nextPage">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      
      </div>

      <div class="footer">
        <span id="views">0</span> views
      </div>

    </div>

  </div>

  <div id="intro">
    <div class="intro-content" id="introText"></div>
  </div>
  
  <div class="music-player" id="musicPlayer">
  
    <img id="cover" src="" alt="cover" class="cover"/>
  
    <div class="music-info">
  
      <div class="song-meta">
        <span id="songTitle">Loading...</span>
        <span id="songArtist">Artist</span>
      </div>
  
      <div class="progress-wrap">
        <span id="currentTime">0:00</span>
  
        <input
          type="range"
          id="progress"
          min="0"
          max="100"
          value="0"
        />
  
        <span id="duration">0:00</span>
      </div>
  
      <div class="controls">
        <button id="prev">
          <i class="fa-solid fa-backward"></i>
        </button>
  
        <button id="playPause">
          <i class="fa-solid fa-pause"></i>
        </button>
  
        <button id="next">
          <i class="fa-solid fa-forward"></i>
        </button>
  
        <input
          type="range"
          id="volume"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
        />
      </div>
  
    </div>
  </div>

  <button id="musicToggle" class="music-toggle">
    <i class="fa-solid fa-music"></i>
  </button>

  <div class="swipe-hint">
    swipe up for projects
  </div>

  <script src="script.js"></script>

  <div id="transition"></div>

</body>
